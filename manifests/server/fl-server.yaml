apiVersion: apps/v1
kind: Deployment
metadata:
  name: fl-server
  namespace: fl-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fl-server
  template:
    metadata:
      labels:
        app: fl-server
    spec:
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/master"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: fl-server
          image: unknowming/fl-server
          args:
            - "-d"
            - "mnist"
            - "-m"
            - "lenet"
            - "-M"
            - "fl"
            - "-le"
            - "1"
            - "-gr"
            - "10"
            - "-nc"
            - "5"
            - "-ncpr"
            - "2"
            - "-de"
            - "cpu"
            - "-p"
            - "3000"
            - "-H"
            - "0.0.0.0"
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: fl-server
  namespace: fl-system
spec:
  selector:
    app: fl-server
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
