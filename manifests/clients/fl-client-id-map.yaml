apiVersion: v1
kind: ConfigMap
metadata:
  name: fl-client-id-map
  namespace: fl-system
data:
  ids: |
    jetson02=0
    jetson03=1
    jetson04=2
    jetson01=3
    yhgwpi=4
  entrypoint.sh: |
    #!/bin/sh
    set -e
    CID=$(grep "^${NODE_NAME}=" /etc/fl-client-id/ids | cut -d= -f2)
    if [ -z "$CID" ]; then
      echo "no CID mapping for node: $NODE_NAME" >&2
      exit 1
    fi
    exec python3 /workspace/client/main.py \
      -cid "$CID" \
      -d "${DEVICE:-cuda}" \
      -su "${SERVER_URL:-fl-server.fl-system.svc.cluster.local:3000}"
