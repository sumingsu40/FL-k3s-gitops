apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fl-client-rpi
  namespace: fl-system
spec:
  selector:
    matchLabels:
      app: fl-client
      device: rpi
  template:
    metadata:
      labels:
        app: fl-client
        device: rpi
    spec:
      nodeSelector:
        device: rpi
      containers:
        - name: fl-client
          image: unknowming/fl-client-rpi:v2.3
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: DEVICE
              value: "cpu"
          command: ["/bin/sh", "/etc/fl-client-id/entrypoint.sh"]
          volumeMounts:
            - name: fl-client-id
              mountPath: /etc/fl-client-id
      volumes:
        - name: fl-client-id
          configMap:
            name: fl-client-id-map
            defaultMode: 0555
